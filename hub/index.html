<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proto Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 1l13 7.5v15L16 31 3 23.5v-15z' fill='%232563eb'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='18' fill='white'%3EP%3C/text%3E%3C/svg%3E">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f5f5f5; color: #111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; padding: 40px 24px; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; color: #111; }
.subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; max-width: 1200px; }

/* Card */
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px 24px; transition: border-color 0.15s, box-shadow 0.15s; position: relative; cursor: pointer; text-decoration: none; color: inherit; display: block; }
.card:hover { border-color: #aaa; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.card.inactive { opacity: 0.45; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
.card-name { font-size: 17px; font-weight: 700; }
.card-url { font-size: 12px; color: #999; margin-bottom: 20px; }

/* Active toggle */
.toggle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #d1d5db; background: #fff; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
.toggle.active { background: #22c55e; border-color: #22c55e; }
.toggle:hover { border-color: #9ca3af; }
.inactive-label { font-size: 11px; color: #9ca3af; margin-right: 6px; }

/* Stats row */
.stats-row { display: flex; gap: 12px; }
.stat-block { flex: 1; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
.stat-block:hover { border-color: #93c5fd; background: #f0f7ff; }
.stat-num { font-size: 36px; font-weight: 700; line-height: 1; }
.stat-num.high { color: #16a34a; }
.stat-num.mid { color: #ca8a04; }
.stat-num.low { color: #dc2626; }
.stat-label { font-size: 10px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
.stat-edit-input { width: 60px; font-size: 28px; font-weight: 700; border: 2px solid #2563eb; border-radius: 6px; padding: 2px 6px; text-align: center; outline: none; background: #fff; color: #111; }

/* Toast */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
.toast { background: #111; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; animation: fadeIn 0.2s; }
.toast.error { background: #dc2626; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Loading pulse */
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.pulse { animation: pulse 1.5s ease-in-out infinite; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; max-width: 1200px; }
.tab-btn { padding: 8px 20px; font-size: 14px; font-weight: 600; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; cursor: pointer; transition: all 0.15s; color: #374151; text-decoration: none; display: inline-block; line-height: 1.4; }
.tab-btn:hover { background: #f3f4f6; }
.tab-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Instructions & Commands layout */
.ic-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1200px; }
@media (max-width: 900px) { .ic-layout { grid-template-columns: 1fr; } }
.ic-col h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #111; }

/* Item list (shared for docs and commands) */
.item-list { max-height: calc(100vh - 260px); overflow-y: auto; }
.item-card { padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; background: #fff; }
.item-card:hover { border-color: #93c5fd; background: #f9fafb; }
.item-card.selected { border-color: #2563eb; background: #eff6ff; }
.item-name { font-size: 14px; font-weight: 600; color: #111; }
.item-desc { font-size: 12px; color: #666; margin-top: 2px; }
.item-date { font-size: 11px; color: #999; margin-top: 4px; }

/* Detail panel */
.detail-panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; max-height: calc(100vh - 220px); overflow-y: auto; }
.detail-panel h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.detail-desc { font-size: 13px; color: #666; margin-bottom: 8px; }
.detail-date { font-size: 11px; color: #999; margin-bottom: 16px; }
.detail-content { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; line-height: 1.6; background: #fafafa; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; max-height: 50vh; overflow-y: auto; }
.detail-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.detail-empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }

/* Edit form */
.edit-form { display: flex; flex-direction: column; gap: 10px; }
.edit-form label { font-size: 12px; font-weight: 600; color: #374151; }
.edit-form input { font-size: 13px; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; outline: none; }
.edit-form input:focus { border-color: #2563eb; }
.edit-form textarea { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; outline: none; min-height: 300px; resize: vertical; line-height: 1.5; }
.edit-form textarea:focus { border-color: #2563eb; }

/* Buttons */
.btn { padding: 6px 16px; font-size: 12px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-save { background: #16a34a; color: #fff; }
.btn-save:hover { background: #15803d; }
.btn-cancel { background: #e5e7eb; color: #374151; }
.btn-cancel:hover { background: #d1d5db; }
.btn-new { background: #2563eb; color: #fff; }
.btn-new:hover { background: #1d4ed8; }

/* Search */
.search-bar { width: 100%; padding: 8px 14px; font-size: 14px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; margin-bottom: 12px; }
.search-bar:focus { border-color: #2563eb; }

/* OpenHands Dashboard */
.oh-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1200px; margin-bottom: 24px; }
.oh-stat { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; text-align: center; }
.oh-stat-num { font-size: 32px; font-weight: 700; }
.oh-stat-label { font-size: 12px; color: #666; margin-top: 4px; }
.oh-stat.queue .oh-stat-num { color: #ca8a04; }
.oh-stat.running .oh-stat-num { color: #2563eb; }
.oh-stat.done .oh-stat-num { color: #16a34a; }
.oh-stat.failed .oh-stat-num { color: #dc2626; }
.oh-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px 24px; max-width: 1200px; margin-bottom: 16px; }
.oh-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.oh-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.oh-dot.queue { background: #ca8a04; } .oh-dot.running { background: #2563eb; } .oh-dot.done { background: #16a34a; } .oh-dot.failed { background: #dc2626; }
.oh-empty { font-size: 13px; color: #999; padding: 8px 0; }
.oh-issue { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.oh-issue:last-child { border-bottom: none; }
.oh-issue-repo { font-size: 11px; color: #999; min-width: 80px; flex-shrink: 0; }
.oh-issue-num { font-size: 11px; font-weight: 600; color: #6b7280; min-width: 32px; }
.oh-issue-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.oh-issue-title a { color: #111; text-decoration: none; }
.oh-issue-title a:hover { text-decoration: underline; color: #2563eb; }
.oh-issue-age { font-size: 11px; color: #999; flex-shrink: 0; }
.oh-refresh { font-size: 12px; color: #2563eb; cursor: pointer; user-select: none; }
.oh-refresh:hover { text-decoration: underline; }
.oh-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; max-width: 1200px; }
.oh-header-title { font-size: 16px; font-weight: 600; }
.oh-header-sub { font-size: 12px; color: #999; }
.oh-containers { font-size: 13px; color: #2563eb; font-weight: 600; }
.oh-log { background: #111; border-radius: 10px; padding: 16px; max-width: 1200px; max-height: 300px; overflow-y: auto; margin-bottom: 16px; }
.oh-log-line { font-family: ui-monospace, monospace; font-size: 12px; color: #d1d5db; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
.oh-log-line.done { color: #86efac; } .oh-log-line.fail { color: #fca5a5; } .oh-log-line.start { color: #fde68a; }
.oh-log-toggle { font-size: 12px; color: #2563eb; cursor: pointer; user-select: none; margin-bottom: 8px; display: inline-block; }
.oh-log-toggle:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Proto Hub</h1>
<p class="subtitle">All project prototypes</p>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('projects')">Projects</button>
  <button class="tab-btn" onclick="switchTab('instructions')">Instructions &amp; Commands</button>
  <button class="tab-btn" onclick="switchTab('openhands')">OpenHands</button>
</div>

<div class="tab-panel active" id="panel-projects">
  <div class="grid" id="projectGrid"></div>
</div>

<div class="tab-panel" id="panel-instructions">
  <div class="ic-layout">
    <!-- Instructions (docs) -->
    <div class="ic-col">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h2>Instructions</h2>
        <button class="btn btn-new" onclick="newDoc()">+ New</button>
      </div>
      <input class="search-bar" id="docsSearch" placeholder="Search instructions..." oninput="filterDocs()">
      <div class="item-list" id="docsList"></div>
    </div>
    <!-- Commands registry -->
    <div class="ic-col">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h2>Commands</h2>
        <button class="btn btn-new" onclick="newCmd()">+ New</button>
      </div>
      <input class="search-bar" id="cmdsSearch" placeholder="Search commands..." oninput="filterCmds()">
      <div class="item-list" id="cmdsList"></div>
    </div>
  </div>
  <!-- Detail panel spans full width when something is selected -->
  <div id="detailPanel" style="max-width:1200px;margin-top:20px"></div>
</div>

<div class="tab-panel" id="panel-openhands">
  <div class="oh-header">
    <div>
      <div class="oh-header-title">OpenHands Monitor</div>
      <div class="oh-header-sub" id="ohLastRefresh">Loading...</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="oh-containers" id="ohContainers"></div>
      <span class="oh-refresh" onclick="loadOpenHands()">&#8635; Refresh</span>
    </div>
  </div>
  <div class="oh-grid">
    <div class="oh-stat queue"><div class="oh-stat-num" id="ohCountQueue">&mdash;</div><div class="oh-stat-label">In Queue</div></div>
    <div class="oh-stat running"><div class="oh-stat-num" id="ohCountRunning">&mdash;</div><div class="oh-stat-label">Running</div></div>
    <div class="oh-stat done"><div class="oh-stat-num" id="ohCountDone">&mdash;</div><div class="oh-stat-label">Done (recent)</div></div>
    <div class="oh-stat failed"><div class="oh-stat-num" id="ohCountFailed">&mdash;</div><div class="oh-stat-label">Failed (recent)</div></div>
  </div>
  <div class="oh-section">
    <h3><span class="oh-dot running"></span> Running</h3>
    <div id="ohRunning"><div class="oh-empty pulse">Loading...</div></div>
  </div>
  <div class="oh-section">
    <h3><span class="oh-dot queue"></span> Queue (oh:ready)</h3>
    <div id="ohQueue"><div class="oh-empty pulse">Loading...</div></div>
  </div>
  <div class="oh-section">
    <h3><span class="oh-dot done"></span> Recently Done</h3>
    <div id="ohDone"><div class="oh-empty pulse">Loading...</div></div>
  </div>
  <div class="oh-section">
    <h3><span class="oh-dot failed"></span> Failed / Abandoned</h3>
    <div id="ohFailed"><div class="oh-empty pulse">Loading...</div></div>
  </div>
  <div>
    <span class="oh-log-toggle" onclick="toggleOhLog()">&#9660; Live Log (oh-watcher)</span>
    <div class="oh-log" id="ohLog" style="display:none"></div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '/hub/api';

const PROJECT_META = {
  'reference':     { name: 'Reference Template', url: 'Mandatory pages template', href: '/reference/' },
  'p2ptax':        { name: 'P2PTax',             url: 'p2ptax.smartlaunchhub.com', href: '/p2ptax/' },
  'avito-georgia': { name: 'Avito Georgia',       url: 'avito-georgia.smartlaunchhub.com', href: '/avito-georgia/' },
  'chesstourism':  { name: 'Chess Tourism',       url: 'chesstourism.smartlaunchhub.com', href: '/chesstourism/' },
  'daterabbit':    { name: 'DateRabbit',          url: 'daterabbit.smartlaunchhub.com', href: '/daterabbit/' },
  'gun':           { name: 'Gun Market',          url: 'arms-market.smartlaunchhub.com', href: '/gun/' },
  'dressit':       { name: 'DressIT',             url: 'dressitnow.com', href: '/dressit/' },
};

const state = { runs: {}, active: {}, projects: [] };

function toast(msg, isError) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function statColor(n) {
  if (n >= 8) return 'high';
  if (n >= 3) return 'mid';
  return 'low';
}

async function apiFetch(path, opts) {
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// ── Cards ─────────────────────────────────────────────────────────────────────

function renderCard(p) {
  const runs = state.runs[p.id] || {};
  const proto = runs.proto || 0;
  const sa = runs.sa || 0;
  const isActive = state.active[p.id] !== false;
  const meta = PROJECT_META[p.id] || { name: p.id, url: '', href: '#' };

  const card = document.createElement('a');
  card.href = meta.href;
  card.className = 'card' + (isActive ? '' : ' inactive');
  card.id = 'card-' + p.id;
  card.innerHTML =
    '<div class="card-header">' +
      '<div class="card-name">' + esc(meta.name) + '</div>' +
      '<div style="display:flex;align-items:center;gap:6px">' +
        (!isActive ? '<span class="inactive-label">inactive</span>' : '') +
        '<div class="toggle ' + (isActive ? 'active' : '') + '" onclick="event.preventDefault();event.stopPropagation();toggleActive(\'' + p.id + '\')" title="Toggle active"></div>' +
      '</div>' +
    '</div>' +
    '<div class="card-url">' + esc(meta.url) + '</div>' +
    '<div class="stats-row">' +
      '<div class="stat-block" onclick="event.preventDefault();event.stopPropagation();editStat(\'' + p.id + '\',\'proto\',' + proto + ',this)" title="Click to edit">' +
        '<div class="stat-num ' + statColor(proto) + '">' + proto + '</div>' +
        '<div class="stat-label">proto</div>' +
      '</div>' +
      '<div class="stat-block" onclick="event.preventDefault();event.stopPropagation();editStat(\'' + p.id + '\',\'sa\',' + sa + ',this)" title="Click to edit">' +
        '<div class="stat-num ' + statColor(sa) + '">' + sa + '</div>' +
        '<div class="stat-label">sa</div>' +
      '</div>' +
    '</div>';
  return card;
}

function renderGrid() {
  const grid = document.getElementById('projectGrid');
  grid.innerHTML = '';
  state.projects.forEach(p => grid.appendChild(renderCard(p)));
}

async function toggleActive(id) {
  const current = state.active[id] !== false;
  try {
    await apiFetch('/projects/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active: !current })
    });
    state.active[id] = !current;
    renderGrid();
    toast(id + (!current ? ' activated' : ' deactivated'));
  } catch (e) { toast('Failed to toggle ' + id, true); }
}

function editStat(projectId, command, currentValue, blockEl) {
  const numEl = blockEl.querySelector('.stat-num');
  if (!numEl) return;
  const input = document.createElement('input');
  input.type = 'number'; input.min = '0'; input.max = '999';
  input.value = currentValue; input.className = 'stat-edit-input';
  numEl.replaceWith(input);
  input.focus(); input.select();

  function save() {
    let val = parseInt(input.value);
    if (isNaN(val) || val < 0) val = 0;
    if (val > 999) val = 999;
    apiFetch('/runs/set', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectId, command, count: val })
    }).then(data => {
      if (!state.runs[projectId]) state.runs[projectId] = {};
      state.runs[projectId][command] = data.count;
      renderGrid();
      toast(command + ' → ' + data.count + ' (' + projectId + ')');
    }).catch(() => { toast('Failed to update ' + command, true); renderGrid(); });
  }

  input.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter') { e.preventDefault(); save(); }
    if (e.key === 'Escape') { e.preventDefault(); renderGrid(); }
  });
  input.addEventListener('blur', save);
  input.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); });
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab-btn[onclick*="' + tab + '"]').classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'instructions' && !icState.loaded) loadInstructions();
  if (tab === 'openhands' && !ohState.loaded) { ohState.loaded = true; loadOpenHands(); setInterval(loadOpenHands, 30000); }
}

// ── Instructions & Commands ───────────────────────────────────────────────────

const icState = {
  loaded: false,
  docs: [], cmds: [],
  selectedType: null, selectedName: null,
  editing: false
};

async function loadInstructions() {
  icState.loaded = true;
  try {
    const [docs, cmds] = await Promise.all([
      apiFetch('/docs'),
      fetch('/api/commands').then(r => r.ok ? r.json() : []).catch(() => [])
    ]);
    icState.docs = docs.sort((a, b) => a.name.localeCompare(b.name));
    icState.cmds = cmds.sort((a, b) => a.name.localeCompare(b.name));
    renderDocsList();
    renderCmdsList();
  } catch (e) {
    document.getElementById('docsList').innerHTML = '<div class="detail-empty">Error loading</div>';
  }
}

function filterDocs() { renderDocsList(); }
function filterCmds() { renderCmdsList(); }

function renderDocsList() {
  const q = (document.getElementById('docsSearch').value || '').toLowerCase();
  const list = icState.docs.filter(d =>
    d.name.toLowerCase().includes(q) || (d.description || '').toLowerCase().includes(q)
  );
  if (!list.length) {
    document.getElementById('docsList').innerHTML = '<div class="detail-empty" style="padding:20px;font-size:13px">' + (icState.docs.length === 0 ? 'No instructions yet' : 'No matches') + '</div>';
    return;
  }
  document.getElementById('docsList').innerHTML = list.map(d => {
    const sel = (icState.selectedType === 'doc' && icState.selectedName === d.name) ? ' selected' : '';
    const date = d.updated_at ? new Date(d.updated_at).toLocaleDateString() : '';
    return '<div class="item-card' + sel + '" onclick="selectDoc(\'' + esc(d.name).replace(/'/g, "\\'") + '\')">' +
      '<div class="item-name">' + esc(d.name) + '</div>' +
      (d.description ? '<div class="item-desc">' + esc(d.description) + '</div>' : '') +
      (date ? '<div class="item-date">' + date + '</div>' : '') +
    '</div>';
  }).join('');
}

function renderCmdsList() {
  const q = (document.getElementById('cmdsSearch').value || '').toLowerCase();
  const list = icState.cmds.filter(c =>
    c.name.toLowerCase().includes(q) || (c.description || '').toLowerCase().includes(q)
  );
  if (!list.length) {
    document.getElementById('cmdsList').innerHTML = '<div class="detail-empty" style="padding:20px;font-size:13px">' + (icState.cmds.length === 0 ? 'No commands yet' : 'No matches') + '</div>';
    return;
  }
  document.getElementById('cmdsList').innerHTML = list.map(c => {
    const sel = (icState.selectedType === 'cmd' && icState.selectedName === c.name) ? ' selected' : '';
    const date = c.updated_at ? new Date(c.updated_at).toLocaleDateString() : '';
    return '<div class="item-card' + sel + '" onclick="selectCmd(\'' + esc(c.name).replace(/'/g, "\\'") + '\')">' +
      '<div class="item-name">/' + esc(c.name) + '</div>' +
      (c.description ? '<div class="item-desc">' + esc(c.description) + '</div>' : '') +
      (date ? '<div class="item-date">' + date + '</div>' : '') +
    '</div>';
  }).join('');
}

async function selectDoc(name) {
  icState.selectedType = 'doc'; icState.selectedName = name; icState.editing = false;
  renderDocsList();
  document.getElementById('detailPanel').innerHTML = '<div class="detail-panel"><div class="pulse" style="color:#aaa;font-size:13px">Loading...</div></div>';
  try {
    const doc = await apiFetch('/docs/' + encodeURIComponent(name));
    renderDocDetail(doc);
  } catch (e) { document.getElementById('detailPanel').innerHTML = '<div class="detail-panel"><div class="detail-empty">Error loading</div></div>'; }
}

function renderDocDetail(doc) {
  const date = doc.updated_at ? new Date(doc.updated_at).toLocaleString() : '';
  document.getElementById('detailPanel').innerHTML =
    '<div class="detail-panel">' +
      '<h2>' + esc(doc.name) + '</h2>' +
      (doc.description ? '<div class="detail-desc">' + esc(doc.description) + '</div>' : '') +
      (date ? '<div class="detail-date">Updated: ' + date + '</div>' : '') +
      '<div class="detail-actions">' +
        '<button class="btn btn-primary" onclick="editDocDetail(\'' + esc(doc.name).replace(/'/g, "\\'") + '\')">Edit</button>' +
      '</div>' +
      '<div class="detail-content">' + esc(doc.content || '') + '</div>' +
    '</div>';
}

async function editDocDetail(name) {
  let doc;
  try { doc = await apiFetch('/docs/' + encodeURIComponent(name)); }
  catch (e) { doc = { name, content: '', description: '' }; }
  renderEditForm({ type: 'doc', name: doc.name, description: doc.description || '', content: doc.content || '', isNew: false });
}

function newDoc() {
  switchTab('instructions');
  icState.selectedType = null; icState.selectedName = null;
  renderEditForm({ type: 'doc', name: '', description: '', content: '', isNew: true });
}

async function selectCmd(name) {
  icState.selectedType = 'cmd'; icState.selectedName = name; icState.editing = false;
  renderCmdsList();
  document.getElementById('detailPanel').innerHTML = '<div class="detail-panel"><div class="pulse" style="color:#aaa;font-size:13px">Loading...</div></div>';
  try {
    const res = await fetch('/api/commands/' + encodeURIComponent(name));
    if (!res.ok) throw new Error(res.status);
    const cmd = await res.json();
    renderCmdDetail(cmd);
  } catch (e) { document.getElementById('detailPanel').innerHTML = '<div class="detail-panel"><div class="detail-empty">Error loading</div></div>'; }
}

function renderCmdDetail(cmd) {
  const date = cmd.updated_at ? new Date(cmd.updated_at).toLocaleString() : '';
  document.getElementById('detailPanel').innerHTML =
    '<div class="detail-panel">' +
      '<h2>/' + esc(cmd.name) + '</h2>' +
      (cmd.description ? '<div class="detail-desc">' + esc(cmd.description) + '</div>' : '') +
      (date ? '<div class="detail-date">Updated: ' + date + '</div>' : '') +
      '<div class="detail-actions">' +
        '<button class="btn btn-primary" onclick="editCmdDetail(\'' + esc(cmd.name).replace(/'/g, "\\'") + '\')">Edit</button>' +
      '</div>' +
      '<div class="detail-content">' + esc(cmd.content || '') + '</div>' +
    '</div>';
}

async function editCmdDetail(name) {
  let cmd;
  try {
    const res = await fetch('/api/commands/' + encodeURIComponent(name));
    cmd = await res.json();
  } catch (e) { cmd = { name, content: '', description: '' }; }
  renderEditForm({ type: 'cmd', name: cmd.name, description: cmd.description || '', content: cmd.content || '', isNew: false });
}

function newCmd() {
  switchTab('instructions');
  icState.selectedType = null; icState.selectedName = null;
  renderEditForm({ type: 'cmd', name: '', description: '', content: '', isNew: true });
}

function renderEditForm({ type, name, description, content, isNew }) {
  icState.editing = true;
  const label = type === 'cmd' ? 'Command name (without /)' : 'Name';
  document.getElementById('detailPanel').innerHTML =
    '<div class="detail-panel">' +
      '<div class="edit-form">' +
        '<label>' + label + (isNew ? '' : ' (read-only)') + '</label>' +
        '<input type="text" id="editName" value="' + esc(name).replace(/"/g, '&quot;') + '"' + (isNew ? '' : ' readonly style="background:#f3f4f6"') + '>' +
        '<label>Description</label>' +
        '<input type="text" id="editDesc" value="' + esc(description).replace(/"/g, '&quot;') + '" placeholder="Short description...">' +
        '<label>Content</label>' +
        '<textarea id="editContent">' + esc(content) + '</textarea>' +
        '<div class="detail-actions">' +
          '<button class="btn btn-save" onclick="saveItem(\'' + type + '\',' + isNew + ')">Save</button>' +
          '<button class="btn btn-cancel" onclick="cancelEdit(\'' + type + '\',\'' + esc(name).replace(/'/g, "\\'") + '\')">Cancel</button>' +
        '</div>' +
      '</div>' +
    '</div>';
}

async function saveItem(type, isNew) {
  const name = document.getElementById('editName').value.trim();
  const desc = document.getElementById('editDesc').value.trim();
  const content = document.getElementById('editContent').value;
  if (!name) { toast('Name is required', true); return; }

  try {
    if (type === 'doc') {
      await fetch(API + '/docs/' + encodeURIComponent(name), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, description: desc })
      }).then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); });
    } else {
      await fetch('/api/commands/' + encodeURIComponent(name), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content, description: desc })
      }).then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); });
    }
    toast('Saved: ' + name);
    icState.loaded = false;
    await loadInstructions();
    if (type === 'doc') selectDoc(name);
    else selectCmd(name);
  } catch (e) { toast('Failed to save', true); }
}

async function cancelEdit(type, name) {
  icState.editing = false;
  if (name) {
    if (type === 'doc') await selectDoc(name);
    else await selectCmd(name);
  } else {
    document.getElementById('detailPanel').innerHTML = '';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const projects = await apiFetch('/projects');
    state.projects = projects;
    projects.forEach(p => { state.active[p.id] = p.active; });
  } catch (e) { state.projects = []; }

  renderGrid();

  apiFetch('/runs/counts').then(data => {
    state.runs = data;
    renderGrid();
  }).catch(() => {});
}

// ── OpenHands ─────────────────────────────────────────────────────────────────

const ohState = { loaded: false, logVisible: false };

function ohAge(ts) {
  if (!ts) return '';
  const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function renderOhIssues(containerId, items, emptyMsg) {
  const el = document.getElementById(containerId);
  if (!items || !items.length) { el.innerHTML = '<div class="oh-empty">' + emptyMsg + '</div>'; return; }
  el.innerHTML = items.slice(0, 20).map(i =>
    '<div class="oh-issue">' +
      '<span class="oh-issue-repo">' + esc(i.repoShort || '') + '</span>' +
      '<span class="oh-issue-num">#' + i.id + '</span>' +
      '<span class="oh-issue-title"><a href="' + esc(i.url) + '" target="_blank">' + esc(i.title) + '</a></span>' +
      '<span class="oh-issue-age">' + ohAge(i.updated_at) + '</span>' +
    '</div>'
  ).join('');
}

async function loadOpenHands() {
  document.getElementById('ohLastRefresh').textContent = 'Refreshing...';
  try {
    const data = await apiFetch('/openhands/issues');
    const queue = data['oh:ready'] || [], running = data['oh:progress'] || [];
    const done = data['oh:done'] || [], failed = (data['oh:failed'] || []).concat(data['oh:abandoned'] || []);
    document.getElementById('ohCountQueue').textContent = queue.length;
    document.getElementById('ohCountRunning').textContent = running.length;
    document.getElementById('ohCountDone').textContent = done.length;
    document.getElementById('ohCountFailed').textContent = failed.length;
    renderOhIssues('ohQueue', queue, 'No issues in queue');
    renderOhIssues('ohRunning', running, 'Nothing running right now');
    renderOhIssues('ohDone', done.slice(0, 10), 'No recent completed tasks');
    renderOhIssues('ohFailed', failed.slice(0, 10), 'No failed tasks');
    document.getElementById('ohLastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) { document.getElementById('ohLastRefresh').textContent = 'Error'; }
  try {
    const cnt = await apiFetch('/openhands/containers');
    document.getElementById('ohContainers').textContent = cnt.count + '/25 containers';
  } catch (e) {}
  if (ohState.logVisible) loadOhLog();
}

async function loadOhLog() {
  const el = document.getElementById('ohLog');
  try {
    const data = await apiFetch('/openhands/log');
    const lines = data.lines || [];
    if (!lines.length) { el.innerHTML = '<div class="oh-log-line" style="color:#666">Log is empty</div>'; return; }
    el.innerHTML = lines.map(line => {
      const cls = line.includes('DONE:') ? 'done' : line.includes('FAIL:') ? 'fail' : line.includes('START:') ? 'start' : '';
      return '<div class="oh-log-line' + (cls ? ' ' + cls : '') + '">' + esc(line) + '</div>';
    }).join('');
  } catch (e) { el.innerHTML = '<div class="oh-log-line" style="color:#666">Error loading log</div>'; }
}

function toggleOhLog() {
  ohState.logVisible = !ohState.logVisible;
  document.getElementById('ohLog').style.display = ohState.logVisible ? 'block' : 'none';
  if (ohState.logVisible) loadOhLog();
}

init();
</script>
